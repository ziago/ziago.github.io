<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Prezzario">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Prezzario Stampe Giulio</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260616-1810">
    <link rel="stylesheet" href="styles.css?v=20260616-1810">
  </head>
  <body>
    <section class="lock-screen" id="lockScreen">
      <form class="lock-box" id="passwordForm">
        <p class="eyebrow">Accesso riservato</p>
        <h1>Prezzario Stampe</h1>
        <label class="field">
          <span>Password</span>
          <input id="passwordInput" type="password" autocomplete="current-password" inputmode="text">
        </label>
        <button class="primary-button" type="submit">Entra</button>
        <p class="auth-error" id="authError"></p>
      </form>
    </section>

    <main class="app-shell locked" id="appShell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Preventivo rapido</p>
          <h1>Prezzario Stampe</h1>
        </div>
        <button class="status-pill exit-button" id="logoutButton" type="button">Esci</button>
      </header>

      <section class="quote-panel" aria-label="Calcolatore preventivo">
        <div class="field-grid">
          <label class="field">
            <span>Formato</span>
            <select id="formatSelect"></select>
          </label>
          <label class="field">
            <span>Quantità</span>
            <input id="quantityInput" type="number" min="1" max="999" step="1" value="1" inputmode="numeric">
          </label>
        </div>

        <label class="field">
          <span>Carta</span>
          <select id="paperSelect"></select>
        </label>

        <div class="quick-row" id="quickFormats" aria-label="Formati rapidi"></div>

        <section class="result" aria-live="polite">
          <div>
            <p class="result-label">Prezzo cliente</p>
            <output id="totalPrice">€ 0,00</output>
          </div>
          <div class="unit-box">
            <span>cad.</span>
            <strong id="unitPrice">€ 0,00</strong>
          </div>
        </section>

        <div class="breakdown">
          <div>
            <span>Carta</span>
            <strong id="paperCost">€ 0,00</strong>
          </div>
          <div>
            <span>Inchiostro Epson</span>
            <strong id="inkCost">€ 0,00</strong>
          </div>
          <div>
            <span>Costo tuo</span>
            <strong id="ownCost">€ 0,00</strong>
          </div>
          <div>
            <span>Ricarico</span>
            <strong id="markupMultiplier">x--</strong>
          </div>
        </div>
        <p class="quote-note" id="quoteNote"></p>
      </section>

      <section class="list-tools">
        <label class="search-field">
          <span>Cerca carta</span>
          <input id="searchInput" type="search" placeholder="Hahnemuhle, Epson, Rag...">
        </label>
        <div class="segmented" id="categoryTabs">
          <button type="button" data-category="ALL" class="active">Tutte</button>
          <button type="button" data-category="PHOTO">Photo</button>
          <button type="button" data-category="FINEART">FineArt</button>
        </div>
      </section>

      <section class="cards" id="cards" aria-label="Carte disponibili"></section>
    </main>

    <template id="cardTemplate">
      <article class="paper-card">
        <div>
          <p class="category"></p>
          <h2></h2>
        </div>
        <dl></dl>
      </article>
    </template>

    <script src="app.js?v=20260616-1810"></script>
  </body>
</html>
